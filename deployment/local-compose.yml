version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: comments-postgres
    environment:
      POSTGRES_USER: comments
      POSTGRES_PASSWORD: comments
      POSTGRES_DB: commentsdb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deployment/local/init.sql:/docker-entrypoint-initdb.d/init.sql

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: comments-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: comments-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 12

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: comments-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"

volumes:
  pg_data:
