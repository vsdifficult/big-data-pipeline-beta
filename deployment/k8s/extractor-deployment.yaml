apiVersion: apps/v1
kind: Deployment
metadata:
  name: comments-extractor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: comments-extractor
  template:
    metadata:
      labels:
        app: comments-extractor
    spec:
      containers:
        - name: extractor
          image: your-registry/comments-extractor:beta
          env:
            - name: KAFKA_BOOTSTRAP
              value: kafka:9092
            - name: RAW_TOPIC
              value: comments.raw
            - name: BATCH_SIZE
              value: "20000"
          envFrom:
            - secretRef:
                name: comments-extractor-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: comments-extractor-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: comments-extractor
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
